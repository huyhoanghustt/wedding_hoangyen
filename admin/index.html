<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <title>Admin Editor - Wedding Data</title>
    <link rel="stylesheet" href="css/admin-base.css">
<link rel="stylesheet" href="css/admin-editors.css">
<link rel="stylesheet" href="css/admin-gallery.css">
<link rel="stylesheet" href="css/admin-guest-links.css">
<link rel="stylesheet" href="css/admin-auth.css">
<link rel="stylesheet" href="css/admin-responsive.css">
</head>
<body>
    <!-- Login Overlay -->
    <div class="login-overlay" id="loginOverlay">
        <div class="login-card">
            <div class="login-header">
                <h2>💒 Wedding Admin</h2>
                <p>Please sign in to continue</p>
            </div>
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="login-field">
                    <label for="loginUsername">Username</label>
                    <input type="text" id="loginUsername" name="username" required autocomplete="username" autofocus>
                </div>
                <div class="login-field">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" name="password" required autocomplete="current-password">
                </div>
                <p class="login-error" id="loginError" style="display: none;"></p>
                <button type="submit" class="btn btn-login" id="btnLogin">Sign In</button>
            </form>
        </div>
    </div>

    <div class="admin-container">
        <header class="admin-header">
            <div class="admin-header-content">
                <h1>💒 Wedding Data Editor</h1>
                <p class="subtitle">Edit JSON data files through UI tabs</p>
            </div>
            <button class="btn btn-logout" id="btnLogout" onclick="handleLogout()" title="Sign out">🚪 Logout</button>
        </header>

        <nav class="tab-nav" id="tabNav">
            <!-- Tabs will be generated by JS -->
        </nav>

        <main class="editor-main">
            <div class="action-bar" id="actionBar">
                <span class="status-indicator" id="statusIndicator">Ready</span>
                <span class="dirty-indicator" id="dirtyIndicator" style="display: none;">⚠️ Unsaved changes</span>
                <div class="action-buttons">
                    <button class="btn btn-reset" id="btnReset" onclick="handleReset()">🔄 Reset to Default</button>
                    <button class="btn btn-discard btn-disabled" id="btnDiscard" disabled onclick="handleDiscard()">❌ Discard</button>
                    <button class="btn btn-save btn-disabled" id="btnSave" disabled onclick="handleSave()">💾 Save</button>
                </div>
            </div>

            <div class="editor-container" id="editorContainer">
                <p class="loading">Loading...</p>
            </div>
        </main>

        <footer class="admin-footer">
            <p>Admin Editor on port 8080 | <a href="http://localhost:3000" target="_blank">View Public Site</a></p>
        </footer>
    </div>

    <!-- Confirmation Modal -->
    <div class="modal-overlay" id="confirmModal" style="display: none;">
        <div class="modal">
            <h3 id="modalTitle">Confirm Action</h3>
            <p id="modalMessage">Are you sure?</p>
            <div class="modal-buttons">
                <button class="btn btn-cancel" onclick="closeModal()">Cancel</button>
                <button class="btn btn-confirm" id="modalConfirmBtn">Confirm</button>
            </div>
        </div>
    </div>

    <div class="text-edit-modal" id="textEditModal">
        <div class="modal">
            <h3>Edit Story Text</h3>
            <textarea id="storyTextEditTextarea" placeholder="Enter multiline story text..."></textarea>
            <div class="modal-buttons">
                <button class="btn btn-cancel" type="button" onclick="closeTextEditModal()">Cancel</button>
                <button class="btn btn-confirm" type="button" id="storyTextEditSaveBtn">Save</button>
            </div>
        </div>
    </div>

    <script src="js/qrcode.min.js"></script>
    <script src="js/admin-app.js"></script>
    <script src="js/admin-gallery-editor.js"></script>
    <script src="js/admin-media-editor.js"></script>
    <script src="js/invitations.js"></script>
    <script src="js/admin-invitations-editor.js"></script>
    <script src="js/admin-guest-links.js"></script>
    <script src="js/admin-story-editor.js"></script>
    <script src="js/admin-table-editor.js"></script>
    <script src="js/admin-tree-editor.js"></script>
</body>
</html>
